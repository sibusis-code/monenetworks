<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Favicon - Globe with M icon -->
  <rect width="180" height="180" rx="40" fill="url(#faviconGradient)"/>
  
  <!-- Globe -->
  <circle cx="90" cy="90" r="60" fill="none" stroke="white" stroke-width="6"/>
  
  <!-- Globe quadrants -->
  <path d="M90 30 Q110 50, 90 90 Q70 50, 90 30Z" fill="#00BCD4" opacity="0.8"/>
  <path d="M30 90 Q50 70, 90 90 Q50 110, 30 90Z" fill="white" opacity="0.3"/>
  <path d="M90 150 Q70 130, 90 90 Q110 130, 90 150Z" fill="white" opacity="0.3"/>
  <path d="M150 90 Q130 110, 90 90 Q130 70, 150 90Z" fill="#00BCD4" opacity="0.8"/>
  
  <!-- M Letter -->
  <path d="M65 80 L68 110 L78 90 L88 110 L92 110 L102 90 L112 110 L115 110 L118 80 L110 80 L98 100 L88 80 L78 100 L65 80Z" fill="white" stroke="white" stroke-width="2"/>
  
  <!-- Cursor Arrow -->
  <path d="M120 80 L140 100 L133 100 L133 115 L127 115 L127 100 L120 100 Z" fill="white"/>
  
  <defs>
    <linearGradient id="faviconGradient" x1="0" y1="0" x2="180" y2="180">
      <stop offset="0%" style="stop-color:#0066CC"/>
      <stop offset="100%" style="stop-color:#0066CC"/>
    </linearGradient>
  </defs>
</svg>
